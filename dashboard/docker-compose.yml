services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "8002:8001"
    environment:
      - DATAAPP_API_URL=${DATAAPP_API_URL:-http://host.docker.internal:8000}
      - DATAAPP_SERVICE_TOKEN=${DATAAPP_SERVICE_TOKEN:-}
      - WEBAPP_API_URL=${WEBAPP_API_URL:-http://host.docker.internal:8001}
      - WEBAPP_SERVICE_TOKEN=${WEBAPP_SERVICE_TOKEN:-}
      - FETCH_INTERVAL_S=${FETCH_INTERVAL_S:-30}
      - FETCH_TIMEOUT_S=${FETCH_TIMEOUT_S:-10}
      - TIME_WINDOW_DAYS=${TIME_WINDOW_DAYS:-2}
      - XSERVER_MAIL_HOST=${XSERVER_MAIL_HOST:-sv16698.xserver.jp}
      - MAIL_ACCOUNTS=${MAIL_ACCOUNTS:-[]}
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    networks:
      - dashboard-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  dashboard-net:
    driver: bridge
