services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "8002:8001"
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    networks:
      - dashboard-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  dashboard-net:
    driver: bridge
